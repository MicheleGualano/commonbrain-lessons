# Auto-merge TRUSTED, same-repo PRs once the deterministic gate is green.
#
# Only the maintainer's own PRs (same repo, not a fork, author OWNER/MEMBER/COLLABORATOR)
# are auto-merged. External/fork contributions are NEVER auto-merged — they wait for a
# human merge (the review-summary bot helps the maintainer decide).
#
# `gh pr merge --auto` schedules the merge; GitHub completes it ONLY when the required
# status check `gate-passed` (the deterministic security/quality gate) is green. So the
# AI advisory bot can never cause a merge — this is purely deterministic + trust-scoped.
name: auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.head.repo.fork == false &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    steps:
      - name: Auto-merge once the required gate-passed check is green
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          concl=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
                    --jq '.check_runs[] | select(.name=="gate-passed") | .conclusion' 2>/dev/null | head -1)
          echo "gate-passed conclusion: ${concl:-<pending>}"
          if [ "$concl" = "success" ]; then
            # Verified green just above → safe to merge now (direct, with --auto fallback
            # if the branch must first be brought up to date under strict protection).
            gh pr merge "$PR" --repo "$REPO" --squash \
              || gh pr merge "$PR" --repo "$REPO" --squash --auto \
              || echo "merge not completed (already merged/closed) — benign"
          elif [ -z "$concl" ] || [ "$concl" = "null" ]; then
            # Still running → schedule auto-merge; GitHub completes it ONLY when gate-passed is green.
            gh pr merge "$PR" --repo "$REPO" --squash --auto \
              || echo "auto-merge not scheduled — benign"
          else
            echo "gate-passed=$concl (not success) → NOT merging."
          fi
